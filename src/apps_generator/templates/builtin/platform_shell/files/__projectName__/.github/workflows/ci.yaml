name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: {{ nodeVersion }}

{% if packageManager == "pnpm" %}
      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm lint
        continue-on-error: true

      - name: Build
        run: pnpm build
{% elif packageManager == "yarn" %}
      - name: Install dependencies
        run: yarn install

      - name: Lint
        run: yarn lint
        continue-on-error: true

      - name: Build
        run: yarn build
{% else %}
      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Build
        run: npm run build
{% endif %}
