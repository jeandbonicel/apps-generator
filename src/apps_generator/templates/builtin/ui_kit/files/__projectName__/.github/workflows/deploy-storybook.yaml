name: Deploy Storybook

on:
  push:
    branches: [main]

env:
  REGISTRY: {{ containerRegistry }}
  IMAGE_NAME: {{ containerRegistry }}/{{ containerRegistryOrg }}/{{ projectName }}-storybook

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: {{ containerRegistry }}
          username: {{ '${{ github.actor }}' }}
          password: {{ '${{ secrets.GITHUB_TOKEN }}' }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: {{ '${{ env.IMAGE_NAME }}' }}
          tags: |
            type=sha
            type=ref,event=branch

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: {{ '${{ steps.meta.outputs.tags }}' }}
          labels: {{ '${{ steps.meta.outputs.labels }}' }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "{{ '${{ secrets.KUBECONFIG }}' }}" | base64 -d > ~/.kube/config

      - name: Set image tag
        run: |
          cd k8s/overlays/dev
          kustomize edit set image {{ '${{ env.IMAGE_NAME }}=${{ env.IMAGE_NAME }}:sha-${{ github.sha }}' }}

      - name: Deploy
        run: |
          kubectl apply -k k8s/overlays/dev
          kubectl rollout status deployment/{{ projectName }}-storybook -n {{ k8sNamespace }} --timeout=300s
