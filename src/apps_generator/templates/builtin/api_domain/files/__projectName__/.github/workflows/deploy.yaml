name: Deploy to Kubernetes

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: dev
        type: choice
        options:
          - dev
          - prod
      image_tag:
        description: "Docker image tag to deploy"
        required: true
        default: main

env:
  REGISTRY: {{ containerRegistry }}
  IMAGE_NAME: {{ containerRegistryOrg }}/{{ projectName }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: {{ '${{ github.event.inputs.environment }}' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "{{ '${{ secrets.KUBECONFIG }}' }}" | base64 -d > $HOME/.kube/config

      - name: Deploy with Kustomize
        run: |
          cd k8s/overlays/{{ '${{ github.event.inputs.environment }}' }}
          kustomize edit set image {{ '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.event.inputs.image_tag }}' }}
          kustomize build . | kubectl apply -f -

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/{{ projectName }} \
            -n {{ k8sNamespace }} \
            --timeout=300s
