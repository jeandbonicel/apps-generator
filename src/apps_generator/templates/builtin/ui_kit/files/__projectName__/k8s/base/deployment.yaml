apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ projectName }}-storybook
  namespace: {{ k8sNamespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ projectName }}-storybook
  template:
    metadata:
      labels:
        app: {{ projectName }}-storybook
    spec:
      containers:
        - name: {{ projectName }}-storybook
          image: {{ containerRegistry }}/{{ containerRegistryOrg }}/{{ projectName }}-storybook:latest
          ports:
            - containerPort: 80
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
