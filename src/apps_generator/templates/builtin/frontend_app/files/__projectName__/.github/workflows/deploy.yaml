name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - prod
      image_tag:
        description: "Image tag to deploy"
        required: true
        type: string

env:
  REGISTRY: {{ containerRegistry }}
  IMAGE_NAME: {{ containerRegistry }}/{{ containerRegistryOrg }}/{{ projectName }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: {{ '${{ inputs.environment }}' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "{{ '${{ secrets.KUBECONFIG }}' }}" | base64 -d > ~/.kube/config

      - name: Set image tag
        run: |
          cd k8s/overlays/{{ '${{ inputs.environment }}' }}
          kustomize edit set image {{ '${{ env.IMAGE_NAME }}=${{ env.IMAGE_NAME }}:${{ inputs.image_tag }}' }}

      - name: Deploy
        run: |
          kubectl apply -k k8s/overlays/{{ '${{ inputs.environment }}' }}
          kubectl rollout status deployment/{{ projectName }} -n {{ k8sNamespace }} --timeout=300s
