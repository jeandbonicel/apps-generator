server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API requests to the backend gateway.
    # GATEWAY_URL is substituted at container startup via envsubst.
    # Default: http://localhost:8080 (overridden by docker-compose).
    location {{ apiBaseUrl }}/ {
        proxy_pass ${GATEWAY_URL};
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Pass correlation and tenant headers to the gateway
        proxy_set_header X-Correlation-ID $http_x_correlation_id;
        proxy_set_header X-Tenant-ID $http_x_tenant_id;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 256;
}
