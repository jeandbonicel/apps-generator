name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: {{ nodeVersion }}

{% if packageManager == "pnpm" %}
      - uses: pnpm/action-setup@v2
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm tsc -b

      - name: Build
        run: pnpm build
{% elif packageManager == "yarn" %}
      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Lint
        run: yarn lint

      - name: Type check
        run: yarn tsc -b

      - name: Build
        run: yarn build
{% else %}
      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc -b

      - name: Build
        run: npm run build
{% endif %}

  e2e:
    runs-on: ubuntu-latest
    needs: build-and-lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: {{ nodeVersion }}

{% if packageManager == "pnpm" %}
      - uses: pnpm/action-setup@v2
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
{% elif packageManager == "yarn" %}
      - name: Install dependencies
        run: yarn install --frozen-lockfile
{% else %}
      - name: Install dependencies
        run: npm ci
{% endif %}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: {{ packageManager }}{% if packageManager == "npm" %} run{% endif %} e2e -- --project=chromium

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: {% raw %}${{ !cancelled() }}{% endraw %}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
